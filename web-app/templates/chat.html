{% extends "base.html" %}

{% block title %}Chat - Chat com Gemma 3{% endblock %}

{% block header %}Chat de Texto{% endblock %}

{% block content %}
<div id="chat-box" style="height: 400px; overflow-y: auto; padding: 16px; background: #f9f9f9; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 16px;"></div>
<div class="form-field">
    <label>Mensagem</label>
    <input type="text" id="message" placeholder="Digite sua mensagem...">
</div>
<button id="send">Enviar</button>

<script>
    const sendBtn = document.getElementById('send');
    const messageInput = document.getElementById('message');
    const chatBox = document.getElementById('chat-box');
    
    function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        chatBox.innerHTML += `<p><strong>Você:</strong> ${message}</p>`;
        messageInput.value = '';

        fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        }).then(response => {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let response_text = '';

            chatBox.innerHTML += `<p><strong>Gemma:</strong> <span id="response"></span></p>`;
            const responseSpan = document.getElementById('response');

            function read() {
                reader.read().then(({ done, value }) => {
                    if (done) {
                        responseSpan.removeAttribute('id');
                        return;
                    }
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));
                            response_text += data.content;
                            responseSpan.textContent = response_text;
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    });
                    read();
                });
            }
            read();
        });
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
